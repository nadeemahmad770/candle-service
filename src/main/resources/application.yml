spring:
  application:
    name: candle-service
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
  servlet:
    context-path: /
logging:
  level:
    root: INFO
    com.multibank.candle: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      jvm: true
      process: true
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
